name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "server.js"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-exe.yml"
      - "scripts/**"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build exe
        run: npm run build:exe

      - name: Prepare release bundle
        shell: cmd
        run: |
          mkdir dist\release
          copy dist\one-click-news-search.exe dist\release\
          xcopy /E /I /Y public dist\release\public
          copy scripts\start-windows.bat dist\release\启动.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-click-news-search-win
          path: dist/release/
